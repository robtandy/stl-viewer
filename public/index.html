<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Viewer</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
      }
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #header {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #0f3460;
        }
        
        #header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e94560;
        }
        
        #file-info {
            flex: 1;
            font-size: 0.9rem;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        #status {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        #status.watching {
            background: #28a745;
            color: white;
        }
        
        #status.reloading {
            background: #ffc107;
            color: black;
        }
        
        #status.error {
            background: #dc3545;
            color: white;
        }
        
        #status.idle {
            background: #6c757d;
            color: white;
        }
        
        #reload-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        
        #reload-btn:hover {
            background: #d63850;
        }
        
        #viewer-container {
            flex: 1;
            position: relative;
        }
        
        #cad_view {
            width: 100%;
            height: 100%;
        }
        
        #loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        
        #loading-overlay.hidden {
            display: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #error-message {
            background: rgba(220, 53, 69, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            margin-top: 16px;
            max-width: 400px;
        }
        
        #error-message.hidden {
            display: none;
        }
        
        #no-file {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
        }
        
        #no-file.hidden {
            display: none;
        }
        
        #no-file p {
            margin-bottom: 8px;
        }
        
        #no-file code {
            background: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>STL Viewer</h1>
        <div id="file-info">No file loaded</div>
        <span id="status" class="idle">Idle</span>
        <button id="reload-btn">Reload</button>
    </div>
    
    <div id="viewer-container">
        <div id="cad_view"></div>
        
        <div id="no-file">
            <p>Run with an STL file:</p>
            <p><code>node server.js path/to/file.stl</code></p>
        </div>
        
        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <div>Loading STL...</div>
            <div id="error-message" class="hidden"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls;
        let currentFilePath = null;
        let pollInterval = null;
        let stlMesh = null;
        
        function initThreeJS() {
            const container = document.getElementById('cad_view');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // Camera
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 10000);
            camera.position.set(100, 100, 100);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);
            
            const directLight = new THREE.DirectionalLight(0xffffff, 1.1);
            directLight.position.set(1, 1, 1);
            scene.add(directLight);
            
            const directLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
            directLight2.position.set(-1, -1, -1);
            scene.add(directLight2);
            
            // Grid helper
            const gridHelper = new THREE.GridHelper(200, 20, 0x444444, 0x333333);
            scene.add(gridHelper);
            
            // Animation loop
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        function setStatus(status, text) {
            const statusEl = document.getElementById('status');
            statusEl.className = status;
            statusEl.textContent = text;
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
            setStatus('error', 'Error');
        }
        
        function hideError() {
            const errorEl = document.getElementById('error-message');
            errorEl.classList.add('hidden');
        }
        
        function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('no-file').classList.add('hidden');
        }
        
        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }
        
        function updateFileInfo(filePath) {
            const fileInfo = document.getElementById('file-info');
            if (filePath) {
                fileInfo.textContent = filePath;
            } else {
                fileInfo.textContent = 'No file loaded';
            }
        }
        
        function loadStlFile() {
            showLoading();
            hideError();
            
            const loader = new STLLoader();
            
            // Fetch the STL file data directly
            fetch('/api/stl-file')
                .then(response => response.json())
                .then(result => {
                    // Convert binary string back to ArrayBuffer
                    const buffer = new ArrayBuffer(result.data.length);
                    const view = new Uint8Array(buffer);
                    for (let i = 0; i < result.data.length; i++) {
                        view[i] = result.data.charCodeAt(i);
                    }
                    
                    // Parse the STL
                    const geometry = loader.parse(buffer);
                    
                    // Store the modified time for change detection
                    lastFileModified = result.modified;
                    
                    // Remove old mesh
                    if (stlMesh) {
                        scene.remove(stlMesh);
                        stlMesh.geometry.dispose();
                        if (stlMesh.material.dispose) stlMesh.material.dispose();
                    }
                    
                    // Check for vertex colors
                    console.log('Geometry attributes:', Object.keys(geometry.attributes));
                    const hasColors = geometry.hasAttribute('color');
                    console.log('Has vertex colors:', hasColors);
                    if (hasColors) {
                        console.log('Color attribute:', geometry.getAttribute('color'));
                    }
                    
                    // Create material - use vertex colors if available
                    let material;
                    if (hasColors) {
                        // Use vertex colors (VisCAM/SolidView)
                        material = new THREE.MeshPhongMaterial({
                            vertexColors: true,
                            side: THREE.DoubleSide,
                            flatShading: false
                        });
                    } else {
                        // Default orange color
                        material = new THREE.MeshPhongMaterial({
                            color: 0xe8b024,
                            side: THREE.DoubleSide
                        });
                    }
                    
                    stlMesh = new THREE.Mesh(geometry, material);
                    
                    // Center and scale
                    geometry.computeBoundingBox();
                    const boundingBox = geometry.boundingBox;
                    const center = new THREE.Vector3();
                    boundingBox.getCenter(center);
                    
                    // Move mesh to center
                    stlMesh.position.sub(center);
                    
                    // Auto-scale to fit view
                    const size = new THREE.Vector3();
                    boundingBox.getSize(size);
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 100 / maxDim;
                    stlMesh.scale.setScalar(scale);
                    
                    scene.add(stlMesh);
                    
                    // Reset camera
                    camera.position.set(150, 150, 150);
                    controls.target.set(0, 0, 0);
                    controls.update();
                    
                    setStatus('watching', 'Watching');
                    hideLoading();
                    
                    startPolling();
                })
                .catch(function (error) {
                    console.error('Error loading STL:', error);
                    showError('Failed to load STL file: ' + error.message);
                    hideLoading();
                });
        }
        
        let lastFileModified = null;
        
        async function checkForChanges() {
            if (!currentFilePath) return;
            
            try {
                // Fetch the file to check if it changed
                const response = await fetch('/api/stl-file');
                const result = await response.json();
                
                if (lastFileModified && result.modified > lastFileModified) {
                    console.log('File changed, reloading...');
                    loadStlFile();
                }
            } catch (error) {
                console.error('Error checking for changes:', error);
            }
        }
        
        function startPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
            
            // Poll for file changes every 500ms
            pollInterval = setInterval(checkForChanges, 500);
        }
        
        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }
        
        async function initialize() {
            try {
                const response = await fetch('/api/file');
                const data = await response.json();
                
                if (data.filePath) {
                    currentFilePath = data.filePath;
                    initThreeJS();
                    loadStlFile();
                } else {
                    document.getElementById('no-file').classList.remove('hidden');
                    setStatus('idle', 'No File');
                }
            } catch (error) {
                console.error('Error initializing:', error);
            }
        }
        
        // Handle window resize
        function handleResize() {
            const container = document.getElementById('cad_view');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            if (camera && renderer) {
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            }
        }
        
        window.addEventListener('resize', handleResize);
        
        // Reload button
        document.getElementById('reload-btn').addEventListener('click', () => {
            if (currentFilePath) {
                setStatus('reloading', 'Reloading...');
                loadStlFile();
            }
        });
        
        // Initialize on load
        initialize();
    </script>
</body>
</html>
